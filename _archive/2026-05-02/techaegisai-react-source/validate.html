<style>
  body { background: #000; color: #fff; font-family: 'Geist', system-ui, sans-serif; -webkit-font-smoothing: antialiased; }
  ::selection { background: rgba(226, 58, 62, 0.6); color: #fff; }
  .liquid-glass {
    background: rgba(255, 255, 255, 0.01);
    backdrop-filter: blur(4px);
    -webkit-backdrop-filter: blur(4px);
    border: none;
    box-shadow: inset 0 1px 1px rgba(255, 255, 255, 0.1);
    position: relative;
    overflow: hidden;
  }
  .liquid-glass::before {
    content: '';
    position: absolute; inset: 0; border-radius: inherit; padding: 1.4px;
    background: linear-gradient(180deg, rgba(255,255,255,0.45) 0%, rgba(255,255,255,0.15) 20%, rgba(255,255,255,0) 40%, rgba(255,255,255,0) 60%, rgba(255,255,255,0.15) 80%, rgba(255,255,255,0.45) 100%);
    -webkit-mask: linear-gradient(#fff 0 0) content-box, linear-gradient(#fff 0 0);
    -webkit-mask-composite: xor; mask-composite: exclude;
    pointer-events: none;
  }
  .liquid-glass-red {
    background: linear-gradient(135deg, rgba(226, 58, 62, 0.18), rgba(226, 58, 62, 0.06));
    backdrop-filter: blur(8px); -webkit-backdrop-filter: blur(8px);
    box-shadow: inset 0 1px 1px rgba(255, 255, 255, 0.15), 0 0 0 1px rgba(255, 80, 84, 0.4), 0 20px 60px -10px rgba(226, 58, 62, 0.5);
  }
  /* Build status banner */
  #build-status {
    position: fixed; top: 16px; left: 50%; transform: translateX(-50%);
    z-index: 99999; padding: 10px 18px; border-radius: 999px;
    font-family: 'Geist Mono', monospace; font-size: 12px;
    backdrop-filter: blur(12px); display: flex; align-items: center; gap: 10px;
    transition: all 0.4s;
  }
  .ok    { background: rgba(74,222,128,0.15); border: 1px solid rgba(74,222,128,0.4); color: #4ade80; }
  .err   { background: rgba(226,58,62,0.20); border: 1px solid rgba(226,58,62,0.6);  color: #ff5e62; }
  .pend  { background: rgba(255,255,255,0.08); border: 1px solid rgba(255,255,255,0.2); color: #fff; }
</style>
</head>
<body>
<div id="build-status" class="pend">⏳ Compiling React + TS components via Babel…</div>
<div id="root"></div>

<!-- Pinned versions -->
<script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
<script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
<script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>

<!-- Stub modules for framer-motion + lucide-react via global mappings -->
<script type="text/babel" data-presets="env,react,typescript">
window.__IMPORTS__ = {};

// === framer-motion stub: pass-through motion proxy + simple useInView ===
const motion = new Proxy({}, {
  get: (_, tag) => {
    return React.forwardRef(({ children, initial, animate, transition, whileHover, whileTap, onHoverStart, onHoverEnd, ...rest }, ref) =>
      React.createElement(tag, { ref, ...rest, onMouseEnter: onHoverStart, onMouseLeave: onHoverEnd }, children)
    );
  },
});
const useInView = () => true;
const AnimatePresence = ({ children }) => children;

window.__IMPORTS__['framer-motion'] = { motion, useInView, AnimatePresence };

// === lucide-react stub: tiny SVG icons by name ===
const makeIcon = (path) => ({ size = 16, className = '', ...p }) =>
  React.createElement('svg', {
    width: size, height: size, viewBox: '0 0 24 24', fill: 'none',
    stroke: 'currentColor', strokeWidth: 2, strokeLinecap: 'round', strokeLinejoin: 'round',
    className, ...p,
  }, React.createElement('g', { dangerouslySetInnerHTML: { __html: path } }));

const ICONS = {
  ArrowRight:    '<line x1="5" y1="12" x2="19" y2="12"/><polyline points="12 5 19 12 12 19"/>',
  ArrowUpRight:  '<line x1="7" y1="17" x2="17" y2="7"/><polyline points="7 7 17 7 17 17"/>',
  Linkedin:      '<path d="M16 8a6 6 0 0 1 6 6v7h-4v-7a2 2 0 0 0-4 0v7h-4v-7a6 6 0 0 1 6-6z"/><rect x="2" y="9" width="4" height="12"/><circle cx="4" cy="4" r="2"/>',
  Twitter:       '<path d="M22 4s-.7 2.1-2 3.4c1.6 10-9.4 17.3-18 11.6 2.2.1 4.4-.6 6-2C3 15.5.5 9.6 3 5c2.2 2.6 5.6 4.1 9 4-.9-4.2 4-6.6 7-3.8 1.1 0 3-1.2 3-1.2z"/>',
  Github:        '<path d="M9 19c-5 1.5-5-2.5-7-3m14 6v-3.87a3.37 3.37 0 0 0-.94-2.61c3.14-.35 6.44-1.54 6.44-7A5.44 5.44 0 0 0 20 4.77 5.07 5.07 0 0 0 19.91 1S18.73.65 16 2.48a13.38 13.38 0 0 0-7 0C6.27.65 5.09 1 5.09 1A5.07 5.07 0 0 0 5 4.77a5.44 5.44 0 0 0-1.5 3.78c0 5.42 3.3 6.61 6.44 7A3.37 3.37 0 0 0 9 18.13V22"/>',
  Calendar:      '<rect x="3" y="4" width="18" height="18" rx="2" ry="2"/><line x1="16" y1="2" x2="16" y2="6"/><line x1="8" y1="2" x2="8" y2="6"/><line x1="3" y1="10" x2="21" y2="10"/>',
  CheckCircle2:  '<circle cx="12" cy="12" r="10"/><polyline points="9 12 12 15 16 10"/>',
  Sparkles:      '<path d="M12 3l1.5 4.5L18 9l-4.5 1.5L12 15l-1.5-4.5L6 9l4.5-1.5z"/>',
  Activity:      '<polyline points="22 12 18 12 15 21 9 3 6 12 2 12"/>',
  Zap:           '<polygon points="13 2 3 14 12 14 11 22 21 10 12 10 13 2"/>',
  AlertCircle:   '<circle cx="12" cy="12" r="10"/><line x1="12" y1="8" x2="12" y2="12"/><line x1="12" y1="16" x2="12.01" y2="16"/>',
  Database:      '<ellipse cx="12" cy="5" rx="9" ry="3"/><path d="M3 5v14a9 3 0 0 0 18 0V5"/><path d="M3 12a9 3 0 0 0 18 0"/>',
  Send:          '<line x1="22" y1="2" x2="11" y2="13"/><polygon points="22 2 15 22 11 13 2 9 22 2"/>',
  Mail:          '<path d="M4 4h16c1.1 0 2 .9 2 2v12c0 1.1-.9 2-2 2H4c-1.1 0-2-.9-2-2V6c0-1.1.9-2 2-2z"/><polyline points="22,6 12,13 2,6"/>',
  FileText:      '<path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z"/><polyline points="14 2 14 8 20 8"/>',
  GitPullRequest:'<circle cx="18" cy="18" r="3"/><circle cx="6" cy="6" r="3"/><path d="M13 6h3a2 2 0 0 1 2 2v7"/><line x1="6" y1="9" x2="6" y2="21"/>',
  CreditCard:    '<rect x="1" y="4" width="22" height="16" rx="2" ry="2"/><line x1="1" y1="10" x2="23" y2="10"/>',
};
const lucideExports = {};
Object.keys(ICONS).forEach(k => lucideExports[k] = makeIcon(ICONS[k]));
window.__IMPORTS__['lucide-react'] = lucideExports;

// === asset import resolver: png -> data url placeholder ===
window.__IMPORTS__['../assets/logo.png'] =
  'data:image/svg+xml;utf8,' + encodeURIComponent(
    '<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 32 32"><circle cx="16" cy="16" r="14" fill="%23e23a3e"/><text x="50%" y="58%" text-anchor="middle" font-family="Arial" font-size="16" fill="white" font-weight="700">T</text></svg>'
  );
</script>

<script>
  // === Tiny module loader for our .tsx files ===
  // Files are fetched as text, transformed by Babel, and `import` rewritten.
  const FILES = {
    'pages/Index':              'src/pages/Index.tsx',
    'components/AboutSection':  'src/components/AboutSection.tsx',
    'components/FeaturedVideoSection': 'src/components/FeaturedVideoSection.tsx',
    'components/LiveAgentSection':     'src/components/LiveAgentSection.tsx',
    'components/PhilosophySection':    'src/components/PhilosophySection.tsx',
    'components/ServicesSection':      'src/components/ServicesSection.tsx',
    'components/BookCallSection':      'src/components/BookCallSection.tsx',
    'components/Footer':               'src/components/Footer.tsx',
  };

  const setStatus = (cls, msg) => {
    const el = document.getElementById('build-status');
    el.className = cls;
    el.textContent = msg;
    if (cls === 'ok') setTimeout(() => el.style.opacity = '0', 4000);
  };

  async function load() {
    try {
      const sources = {};
      for (const [k, path] of Object.entries(FILES)) {
        const r = await fetch(path);
        if (!r.ok) throw new Error(`Failed to fetch ${path}`);
        sources[k] = await r.text();
      }

      const moduleCache = {};
      const exec = (key, src) => {
        if (moduleCache[key]) return moduleCache[key];

        // Rewrite imports to use our local resolver
        let body = src
          .replace(/import\s+(\{[^}]+\}|\w+)\s+from\s+['"]([^'"]+)['"];?/g, (_, what, from) => {
            if (from === 'react') return `const ${what} = window.React;`;
            if (from === 'react-dom') return `const ${what} = window.ReactDOM;`;
            if (from === 'react-dom/client') return `const ${what} = window.ReactDOM;`;
            if (from === 'framer-motion' || from === 'lucide-react') {
              return `const ${what} = window.__IMPORTS__['${from}'];`;
            }
            // Asset import
            if (/\.(png|jpg|svg)$/.test(from)) {
              return `const ${what} = window.__IMPORTS__['${from}'] || '';`;
            }
            // Local module: ./components/X or ./pages/X or ../components/X
            const rel = from.replace(/^\.+\//, '');
            return `const ${what.replace(/[{}]/g, '')} = (window.__MODULES__['${rel}'] && window.__MODULES__['${rel}'].default) ? window.__MODULES__['${rel}'].default : window.__MODULES__['${rel}'];`;
          })
          .replace(/export\s+default\s+function\s+(\w+)/, 'function $1; window.__MODULES__[\'__current\'] = { default: ($1 = function $1')
          // Simpler: replace `export default ` with assignment
          ;

        // Fallback simpler rewrite — undo prior, do it cleanly:
        body = src
          .replace(/import\s+(\{[^}]+\}|\w+)\s+from\s+['"]([^'"]+)['"];?/g, (_, what, from) => {
            if (from === 'react') return `const ${what} = window.React;`;
            if (from === 'framer-motion' || from === 'lucide-react') {
              return `const ${what} = window.__IMPORTS__['${from}'];`;
            }
            if (/\.(png|jpg|svg)$/.test(from)) {
              const name = what.replace(/[{}]/g, '').trim();
              return `const ${name} = window.__IMPORTS__['${from}'] || window.__IMPORTS__['../assets/logo.png'];`;
            }
            const rel = from.replace(/^\.+\//, '').replace(/^\.\.\//, '');
            const name = what.replace(/[{}]/g, '').trim();
            return `const ${name} = window.__MODULES__['${rel}']?.default;`;
          })
          .replace(/export\s+default\s+/, 'window.__MODULES__[\'__last_export__\'] = ');

        const transformed = Babel.transform(body, {
          presets: [['env', { targets: { esmodules: true } }], 'react', 'typescript'],
          filename: key + '.tsx',
        }).code;

        // Run in a function scope
        const fn = new Function('React', 'window', transformed + '\nreturn window.__MODULES__["__last_export__"];');
        window.__MODULES__ = window.__MODULES__ || {};
        const result = fn(window.React, window);
        const mod = { default: result };
        moduleCache[key] = mod;
        window.__MODULES__[key] = mod;
        return mod;
      };

      // Load in dependency order (leaves first)
      ['components/AboutSection',
       'components/FeaturedVideoSection',
       'components/PhilosophySection',
       'components/ServicesSection',
       'components/Footer',
       'components/LiveAgentSection',
       'components/BookCallSection',
       'pages/Index',
      ].forEach(k => exec(k, sources[k]));

      // Compose App
      const Index = window.__MODULES__['pages/Index'].default;
      const About = window.__MODULES__['components/AboutSection'].default;
      const Featured = window.__MODULES__['components/FeaturedVideoSection'].default;
      const Live = window.__MODULES__['components/LiveAgentSection'].default;
      const Philo = window.__MODULES__['components/PhilosophySection'].default;
      const Services = window.__MODULES__['components/ServicesSection'].default;
      const Book = window.__MODULES__['components/BookCallSection'].default;
      const Foot = window.__MODULES__['components/Footer'].default;

      const App = () => React.createElement('div', { className: 'bg-black text-white' },
        React.createElement(Index, null),
        React.createElement(About, null),
        React.createElement(Featured, null),
        React.createElement(Live, null),
        React.createElement(Philo, null),
        React.createElement(Services, null),
        React.createElement(Book, null),
        React.createElement(Foot, null),
      );

      ReactDOM.createRoot(document.getElementById('root')).render(React.createElement(App));
      setStatus('ok', '✓ All 8 components compiled & rendered. React build is valid.');
      console.log('[validator] OK — all components compiled.');
    } catch (e) {
      console.error(e);
      setStatus('err', '✗ Build error: ' + e.message);
    }
  }

  // wait for libs
  const waitFor = () => (window.React && window.ReactDOM && window.Babel) ? load() : setTimeout(waitFor, 50);
  waitFor();
</script>
</body>
</html>
